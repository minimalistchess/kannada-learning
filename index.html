function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function mkQ(card,all,rev,type){
  type=type||'mcq';
  if(type==='pron') return mkPronQ(card,all);
  if(type==='ctx'){const q=mkCtxQ(card,all);if(q)return q;type='mcq';}
  if(type==='scr'){const q=mkScrQ(card,all);if(q)return q;type='rev';}
  if(type==='odd'){const q=mkOddQ(card,all);if(q)return q;type='mcq';}
  if(type==='chain'){const q=mkChainQ(card,all);if(q)return q;type='rev';}
  if(type==='rev') return mkRevQ(card,all);
  if(type==='sentence'){
    const sq=mkSentenceQ(card,all);
    if(sq)return sq;
    type='mcq'; // fallback if card has only 1 word
  }
  if(type==='fill'){
    // show English → type romanization; or show KN → type English
    const cv=rev?card.en.toLowerCase().trim():card.rom.toLowerCase().trim();
    return{card,type:'fill',rev,cv};
  }
  if(type==='match'){
    const pool=shuf(all.filter(c=>c.kn!==card.kn)).slice(0,3);
    const pairs=[card,...pool].map(c=>({en:c.en,kn:c.kn,rom:c.rom}));
    const lefts=pairs.map((p,i)=>({en:p.en,pi:i}));
    const rights=shuf(pairs.map((p,i)=>({kn:p.kn,rom:p.rom,pi:i})));
    return{card,type:'match',rev:false,cv:'__match__',pairs,lefts,rights};
  }
  // MCQ (default)
  if(rev){const p=all.filter(c=>c.en!==card.en);const d=shuf(p).slice(0,3).map(c=>({l:c.en,v:c.en}));return{card,type:'mcq',opts:shuf([{l:card.en,v:card.en},...d]),cv:card.en,rev:true};}
  else{const p=all.filter(c=>c.kn!==card.kn);const d=shuf(p).slice(0,3).map(c=>({l:c.kn,s:c.rom,v:c.kn}));return{card,type:'mcq',opts:shuf([{l:card.kn,s:card.rom,v:card.kn},...d]),cv:card.kn,rev:false};}
}

  if(p.length<4){p=qs.cats.has('ALL')?[...AC]:AC.filter(c=>qs.cats.has(c.category));if(p.length<4)p=[...AC];}
  const target=qs.count==='max'?p.length:Number(qs.count);

  document.getElementById('app').innerHTML=rHdr()+rTabs()+`<div class="body">${b}</div>`;
  if(S.mode==='quiz'&&S.qpool.length&&S.qi<S.qpool.length&&!S.qstate){const _q=S.qpool[S.qi];if(_q&&_q.type!=='match')setTimeout(startTmr,50);}
}
// Handlers
function SM(m){stopTmr();if(m==='quiz'&&S.mode!=='quiz'){S.qpool=[];}S.mode=m;render();}
function SC(c){S.cat=c;S.idx=0;S.flip=false;S.showBook=false;S.search='';markSeen();render();}
function flipCard(){S.flip=!S.flip;render();}
function nav(d){S.flip=false;const f=gf();let n=S.idx+d;if(n<0)n=f.length-1;if(n>=f.length)n=0;S.idx=n;markSeen();render();}
function rndCard(){const f=gf();S.idx=Math.floor(Math.random()*f.length);S.flip=false;markSeen();render();}
function markMast(){const f=gf(),c=f[S.idx];if(c){S.mastered.add(c.kn);}nav(1);}
function markSeen(){const f=gf(),c=f[S.idx];if(c){S.seen.add(c.kn);S.lc++;if(S.lc>0&&S.lc%8===0)S.banner=true;}}
function tgBk(kn){S.bookmarks.has(kn)?S.bookmarks.delete(kn):S.bookmarks.add(kn);render();}
function doSearch(v){S.search=v;S.idx=0;render();}
function openQS(){stopTmr();S.qpool=[];S.mode='quiz';render();}
function tgQC(c){if(c==='ALL'){S.qs.cats=new Set(['ALL']);}else{S.qs.cats.delete('ALL');S.qs.cats.has(c)?S.qs.cats.delete(c):S.qs.cats.add(c);if(!S.qs.cats.size)S.qs.cats.add('ALL');}render();}
function setQC(v){S.qs.count=v;render();}
function stepC(d){const cur=S.qs.count==='max'?prev().avail:Number(S.qs.count);S.qs.count=Math.max(1,cur+d);render();}
function launchQ(){
  stopTmr();const pool=bp();S.lastCards=pool.map(q=>q.card);S.qpool=pool;S.qi=0;S.qstate=null;S.qscore={r:0,w:0};S.streak=0;S.maxStreak=0;S.banner=false;S.mode='quiz';S.matchSel=null;S.matchMatched={};S.matchErrors=0;
  render();
}
function repeatQ(){
  stopTmr();const cards=shuf(S.lastCards);const qs=S.qs;
  const types2=['mcq','fill','match','sentence','sentence','pron','ctx','scr','odd','chain','rev'];
  S.qpool=cards.map(c=>{const rv=qs.dir==='kn-en'?true:qs.dir==='en-kn'?false:Math.random()>0.5;const t=types2[0|Math.random()*types2.length];return mkQ(c,AC,rv,t);});
  S.qi=0;S.qstate=null;S.qscore={r:0,w:0};S.streak=0;S.maxStreak=0;S.matchSel=null;S.matchMatched={};S.matchErrors=0;render();
}
function rFillQ(q){
  const done=!!S.qstate;
  const inpCls=done?(S.qstate.ok?'ok2':'ng2'):'';
  const res=done?`<div class="qres ${S.qstate.ok?'ok':'ng'}">${S.qstate.ok?`✓ Correct! ${S.streak>1?`<span class="stk">🔥 ${S.streak} streak</span>`:''}`:S.qstate.chosen==='__to__'?`⏱ Time's up! Correct: <em>${e(q.cv)}</em>`:`✗ Correct: <em>${e(q.cv)}</em>`}</div><div class="qnw"><button class="nb" onclick="nextQ()">${S.qi+1>=S.qpool.length?'See Results 🏆':'Next →'}</button></div>`:
  `<div class="qnw" style="margin-top:6px"><button class="fill-btn" onclick="submitFill()">Check ✓</button></div>`;
  const prompt=q.rev?'Type the English meaning:':'Type the romanized pronunciation (e.g. Namaskāra):';
  const hint=q.rev?`<div class="qkn" style="font-size:clamp(28px,5vw,42px)">${q.card.kn}</div><div class="qrom">${q.card.rom}</div>`:`<div class="qen">${e(q.card.en)}</div>`;
  return`<div class="qcard"><div class="qcl">${prompt}</div>${hint}</div>
  <div class="fill-wrap"><input class="fill-inp ${inpCls}" id="fill-inp" type="text" placeholder="${q.rev?'English meaning…':'Romanization…'}" ${done?'disabled':''} onkeydown="if(event.key==='Enter'&&!${done})submitFill()"></div>
  ${res}<div class="kh">Press Enter to check</div>`;
}
function rMatchQ(q){
  const mm=S.matchMatched,ms=S.matchSel;
  const allDone=Object.keys(mm).length===q.pairs.length;
  const lefts=q.lefts.map((l,i)=>{
    const isDone=mm[i]!==undefined;const isSel=ms===i;const isErr=S.matchErrors>0&&!isDone&&false;
    const cls=isDone?'mok':isSel?'msel':'';
    return`<div class="mli ${cls}" onclick="${isDone?'':'selLeft('+i+')'}">${e(l.en)}</div>`;
  }).join('');
  const rights=q.rights.map((r,i)=>{
    const usedByLeft=Object.values(mm).indexOf(i)>=0;
    const cls=usedByLeft?'mok':'';
    return`<div class="mri ${cls}" onclick="${usedByLeft?'':'selRight('+i+')'}">${r.kn}<small>${r.rom}</small></div>`;
  }).join('');
  const doneBar=allDone?`<div class="qres ${S.matchErrors===0?'ok':'ng'}">${S.matchErrors===0?`✓ Perfect match! ${S.streak>1?`<span class="stk">🔥 ${S.streak} streak</span>`:''}`:`✓ All matched — ${S.matchErrors} wrong attempt${S.matchErrors>1?'s':''}`}</div><div class="qnw"><button class="nb" onclick="nextQ()">${S.qi+1>=S.qpool.length?'See Results 🏆':'Next →'}</button></div>`:
  `<div class="kh">Click an English word, then its Kannada match</div>`;
  return`<div class="qcard" style="padding:14px 12px"><div class="qcl">Match each English word to its Kannada</div></div>
  <div class="mtch"><div class="mcol"><div class="mcol-hd">English</div>${lefts}</div><div class="mcol"><div class="mcol-hd">ಕನ್ನಡ</div>${rights}</div></div>${doneBar}`;
}
function submitFill(){
  if(S.qstate)return;stopTmr();
  const inp=document.getElementById('fill-inp');if(!inp)return;
  const val=inp.value.toLowerCase().trim();
  const q=S.qpool[S.qi];
  const correct=q.cv.toLowerCase().trim();
  // Accept if val matches cv (allowing minor diacritics miss: strip diacritics for comparison)
  const strip=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
  const ok=val===correct||strip(val)===strip(correct);
  S.qstate={chosen:ok?correct:'__wrong__',correct:q.cv,ok};
  S.qscore.r+=ok?1:0;S.qscore.w+=ok?0:1;
  S.streak=ok?S.streak+1:0;if(S.streak>S.maxStreak)S.maxStreak=S.streak;
  render();setTimeout(()=>{const i=document.getElementById('fill-inp');if(i){i.classList.add(ok?'ok2':'ng2');}},10);
}
function selLeft(i){if(S.matchMatched[i]!==undefined)return;S.matchSel=i;render();}
function selRight(i){
  if(S.matchSel===null)return;
  const q=S.qpool[S.qi];
  const leftPi=q.lefts[S.matchSel].pi;
  const rightPi=q.rights[i].pi;
  if(leftPi===rightPi){
    S.matchMatched[S.matchSel]=i;S.matchSel=null;
    const allDone=Object.keys(S.matchMatched).length===q.pairs.length;
    if(allDone){const ok=S.matchErrors===0;S.qscore.r+=ok?1:0;S.qscore.w+=ok?0:1;S.streak=ok?S.streak+1:0;if(S.streak>S.maxStreak)S.maxStreak=S.streak;}
  } else {
    S.matchErrors++;
    // Flash error briefly
    const lEl=document.querySelectorAll('.mli')[S.matchSel];
    const rEl=document.querySelectorAll('.mri')[i];
    if(lEl){lEl.classList.add('mng');setTimeout(()=>lEl.classList.remove('mng'),500);}
    if(rEl){rEl.classList.add('mng');setTimeout(()=>rEl.classList.remove('mng'),500);}
    S.matchSel=null;
    render();return;
  }
  render();
}
function mkSentenceQ(card,all){
  const romWords=card.rom.trim().split(/\s+/);
  if(romWords.length<2)return null;
  const skip=new Set(['nānu','nanu','nanna','nanage','nīvu','nivu','nimage','nimma','nāvu','navu','namma','avaru','avanu','avaḷu','adu','idu','illi','alli','tumbā','tumba','svalpa','dayaviṭṭu','dayavittu','ondu','eraḍu','mūru']);
  const cands=romWords.map((w,i)=>({w,i})).filter(({w,i})=>{
    const cl=w.toLowerCase().replace(/[?!.,āīūṭḍṇṣśḷ]/g,c=>c);
    return i>0 && !skip.has(w.toLowerCase()) && w.replace(/[?!.,]/g,'').length>3;
  });
  if(!cands.length)return null;
  const target=cands[cands.length-1];
  const targetWord=target.w;
  const cleanTarget=targetWord.replace(/[?!.,]/g,'').toLowerCase();
  // blanked sentence as plain text (no HTML in it — rendered via innerText)
  const blankedParts=romWords.map((w,i)=>i===target.i?'BLANK_HERE':w);
  // hint: strip stop-words from English
  const stops=new Set(['i','you','we','he','she','it','the','a','an','is','are','was','am','be','my','your','our','their','his','her','very','quite','not','do','does','did','to','of','in','at','for','on','with','by','from','have','has','had','this','that','please','can','will']);
  const hw=card.en.toLowerCase().replace(/[?!.,]/g,'').split(/\s+/).filter(w=>!stops.has(w)&&w.length>1);
  const hint='word for: '+(hw.slice(0,3).join(' / ')||card.en);
  // distractors: words from other multi-word cards at same position
  const pool=shuf(all.filter(c=>c.kn!==card.kn&&c.rom.trim().split(/\s+/).length>=2));
  const dists=[];
  for(const c of pool){
    const ws=c.rom.trim().split(/\s+/);
    const w=(ws[Math.min(target.i,ws.length-1)]||ws[ws.length-1]).replace(/[?!.,]/g,'');
    if(w.length>3&&w.toLowerCase()!==cleanTarget&&!dists.find(d=>d.toLowerCase()===w.toLowerCase())){
      dists.push(ws[Math.min(target.i,ws.length-1)]);
      if(dists.length>=3)break;
    }
  }
  // fallback distractors
  const fb=['māḍuttēne','baruttēne','hōguttēne','kūruttēne','tinnuttēne','nōḍuttēne','kēḷuttēne','bēku','bēḍa','ide','illa','sari'];
  let fi=0;
  while(dists.length<3){const d=fb[fi++]||'ide';if(d.toLowerCase()!==cleanTarget&&!dists.find(x=>x.toLowerCase()===d.toLowerCase()))dists.push(d);}
  const opts=shuf([{l:targetWord,v:targetWord},...dists.slice(0,3).map(w=>({l:w,v:w}))]);
  return{card,type:'sentence',blankedParts,hint,cv:targetWord,opts,rev:false};
}

  const opts=q.opts.map((o,idx)=>{
    let cls='';if(done){if(o.v===S.qstate.correct)cls=' ok2';else if(o.v===S.qstate.chosen)cls=' ng2';}
    const dis=done?'disabled':'';
    return`<button class="ob2${cls}" ${dis} onclick="ansQ('${o.v.replace(/'/g,"\'")}')" style="font-size:clamp(11px,2.5vw,15px);word-break:break-word"><span>${o.l}</span></button>`;

function mkPronQ(card,all){
  const p=all.filter(c=>c.kn!==card.kn);
  const d=shuf(p).slice(0,3).map(c=>({l:c.rom,v:c.rom}));
  const opts=shuf([{l:card.rom,v:card.rom},...d]);
  return{card,type:'pron',opts,cv:card.rom,rev:false};
}
function mkCtxQ(card,all){
  const cat=card.category;
  const catCards=all.filter(c=>c.category===cat&&c.kn!==card.kn);
  if(catCards.length<2)return null;
  const companions=shuf(catCards).slice(0,2);
  const words=[card,...companions];
  const allCats=[...new Set(all.map(c=>c.category))];
  const wrongCats=shuf(allCats.filter(c=>c!==cat)).slice(0,3);
  const opts=shuf([{l:cat,v:cat},...wrongCats.map(c=>({l:c,v:c}))]);
  return{card,type:'ctx',words,opts,cv:cat,rev:false};
}
function mkScrQ(card,all){
  if(card.rom.trim().split(/\s+/).length>1)return null;
  const w=card.rom.trim();
  if(w.length<4)return null;
  const arr=w.split('');
  let scr=w;
  while(scr===w){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}scr=a.join('');}
  const p=all.filter(c=>c.kn!==card.kn&&c.rom.trim().split(/\s+/).length===1&&c.rom.trim().length>=4);
  const d=shuf(p).slice(0,3).map(c=>({l:c.rom,v:c.rom}));
  const opts=shuf([{l:card.rom,v:card.rom},...d]);
  return{card,type:'scr',scr,opts,cv:card.rom,rev:false};
}
function mkOddQ(card,all){
  const cat=card.category;
  const same=shuf(all.filter(c=>c.category===cat&&c.kn!==card.kn)).slice(0,3);
  if(same.length<3)return null;
  const diffCats=all.filter(c=>c.category!==cat);
  if(!diffCats.length)return null;
  const odd=shuf(diffCats)[0];
  const four=shuf([...same,odd]);
  return{card,type:'odd',four,cv:odd.kn,rev:false};
}
function mkChainQ(card,all){
  const romWords=card.rom.trim().split(/\s+/);
  if(romWords.length<3)return null;
  const shuffled=shuf(romWords);
  const p=all.filter(c=>c.kn!==card.kn&&c.rom.trim().split(/\s+/).length>=3);
  const d=shuf(p).slice(0,3).map(c=>({l:c.rom,v:c.rom}));
  const opts=shuf([{l:card.rom,v:card.rom},...d]);
  return{card,type:'chain',shuffled,opts,cv:card.rom,rev:false};
}
function mkRevQ(card,all){
  const p=all.filter(c=>c.en!==card.en);
  const d=shuf(p).slice(0,3).map(c=>({l:c.en,v:c.en}));
  const opts=shuf([{l:card.en,v:card.en},...d]);
  return{card,type:'rev',opts,cv:card.en,rev:true};
}
function stdResult(q){
  if(!S.qstate)return'';
  const ok=S.qstate.ok;
  const streak=ok&&S.streak>1?`<span class="stk">🔥 ${S.streak} streak</span>`:'';
  const ans=ok?`✓ Correct! ${streak}`:`✗ Correct: <em>${e(S.qstate.correct)}</em>`;
  const full=`<div class="qrs" style="margin-top:6px;color:#c8d8f0">📖 <strong>${e(q.card.en)}</strong> → ${e(q.card.rom)} → ${q.card.kn}</div>`;
  return`<div class="qres ${ok?'ok':'ng'}">${ans}${full}</div><div class="qnw"><button class="nb" onclick="nextQ()">${S.qi+1>=S.qpool.length?'See Results 🏆':'Next →'}</button></div>`;
}

}

  S.qstate={chosen:v,correct:q.cv,ok};
  S.qscore.r+=ok?1:0;S.qscore.w+=ok?0:1;
  S.streak=ok?S.streak+1:0;if(S.streak>S.maxStreak)S.maxStreak=S.streak;

function nextQ(){
  S.qi++;S.qstate=null;S.matchSel=null;S.matchMatched={};S.matchErrors=0;
  if(S.qi>=S.qpool.length){
    const sc=S.qscore,qs=S.qs;
    const cats=qs.cats.has('ALL')?'All':Array.from(qs.cats).map(c=>c.split(' ')[0]).join(',');
    S.hist.push({r:sc.r,t:S.qpool.length,dir:qs.dir,cats});
  }
  render();
}
// Keyboard
document.addEventListener('keydown',e=>{
  if(S.mode==='learn'){
    if(e.key==='ArrowLeft')nav(-1);
    else if(e.key==='ArrowRight')nav(1);
    else if(e.key===' '){e.preventDefault();flipCard();}
    else if(e.key.toLowerCase()==='m')markMast();
  }else if(S.mode==='quiz'&&S.qpool.length&&S.qi<S.qpool.length){
    const q=S.qpool[S.qi];
    if(!S.qstate&&['mcq','sentence','pron','ctx','scr','chain','rev'].includes(q.type)){
      const keys=['1','2','3','4'];const ki=keys.indexOf(e.key);
      if(ki>=0){if(q.type==='odd'&&ki<q.four.length)ansOdd(q.four[ki].kn,q.four[ki].category);else if(q.opts&&ki<q.opts.length)ansQ(q.opts[ki].v);}
    }else if(!S.qstate&&q.type==='fill'&&e.key==='Enter'){e.preventDefault();submitFill();}
    else if(S.qstate&&(e.key===' '||e.key==='Enter')&&q.type!=='match'&&q.type!=='fill'){e.preventDefault();nextQ();}
    else if(q.type==='match'){const allDone=Object.keys(S.matchMatched).length===q.pairs.length;if(allDone&&(e.key===' '||e.key==='Enter')){e.preventDefault();nextQ();}}
  }
});
