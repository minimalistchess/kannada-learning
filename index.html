<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ಕನ್ನಡ ಕಲಿಯೋಣ – Learn Kannada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0a0f1a 0%,#141a2e 60%,#0f1820 100%);font-family:Georgia,'Times New Roman',serif;color:#e8d5b7;-webkit-user-select:none;user-select:none}

/* ── Header ── */
.header{background:linear-gradient(90deg,#8a6010,#d4a843,#f0c96a,#d4a843,#8a6010);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 24px rgba(212,168,67,.5)}
.header-title{font-size:clamp(14px,3vw,20px);font-weight:bold;color:#1a0800;letter-spacing:1px}
.header-sub{font-size:10px;color:#4a2800;margin-top:2px}
.header-stats{text-align:right;font-size:12px;color:#4a2800;font-weight:bold}
.header-stats span{display:block;font-size:10px;color:#6a4000;font-weight:normal}

/* ── Tabs ── */
.tabs{display:flex;background:rgba(0,0,0,.3);border-bottom:2px solid rgba(212,168,67,.25)}
.tab{flex:1;padding:11px 6px;border:none;background:transparent;color:#7a6a4a;font-family:Georgia,serif;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{background:rgba(212,168,67,.15);color:#f0c96a;border-bottom:2px solid #f0c96a;font-weight:bold}

/* ── Body ── */
.body{padding:14px;max-width:680px;margin:0 auto}

/* ── Progress bar ── */
.prog-bar{height:4px;background:rgba(255,255,255,.07);border-radius:4px;margin-bottom:12px}
.prog-fill{height:100%;background:linear-gradient(90deg,#d4a843,#f0c96a);border-radius:4px;transition:width .4s}
.prog-label{font-size:10px;color:#5a4a30;text-align:right;margin-bottom:12px}

/* ── Category grid ── */
.cat-label{font-size:11px;color:#6a5a40;margin-bottom:8px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.cat-btn{padding:9px 8px;border-radius:9px;border:2px solid rgba(212,168,67,.25);background:rgba(255,255,255,.025);color:#9a806a;font-family:Georgia,serif;font-size:10px;cursor:pointer;text-align:center;transition:all .2s;line-height:1.4}
.cat-btn.active{border-color:#f0c96a;background:rgba(212,168,67,.18);color:#f0c96a}
.cat-btn small{opacity:.65}

/* ── Flash Card ── */
.card-wrap{perspective:1200px;height:290px;margin-bottom:18px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;box-shadow:0 8px 32px rgba(0,0,0,.55);text-align:center}
.card-face.front{background:linear-gradient(145deg,#1a150a,#251a00);border:2px solid rgba(212,168,67,.3)}
.card-face.back{background:linear-gradient(145deg,#0f2010,#091505);border:2px solid rgba(212,168,67,.5);transform:rotateY(180deg)}
.card-badge{position:absolute;top:12px;left:12px;font-size:10px;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);border-radius:20px;padding:3px 9px;color:#d4a843}
.card-mastered{position:absolute;top:12px;right:12px;font-size:10px;color:#6adc6a}
.card-flip-hint{position:absolute;bottom:12px;right:14px;font-size:10px;color:rgba(212,168,67,.4)}
.card-lang{font-size:10px;color:#6a5040;margin-bottom:10px}
.card-en{font-size:clamp(16px,3.5vw,26px);color:#e8d5b7;font-weight:bold;line-height:1.3}
.card-kn{font-size:clamp(34px,7vw,56px);color:#f0c96a;line-height:1.2}
.card-rom{font-size:13px;color:#d4a843;margin-top:6px;font-style:italic}
.card-tip{font-size:11px;color:#7a9a6a;margin-top:10px;font-style:italic}
.card-hint-text{font-size:10px;color:rgba(212,168,67,.35);margin-top:16px}

/* ── Nav Row ── */
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.nav-btn{padding:10px 18px;border-radius:10px;border:2px solid rgba(212,168,67,.4);background:rgba(212,168,67,.12);color:#f0c96a;font-family:Georgia,serif;font-size:13px;cursor:pointer;transition:all .2s}
.nav-btn:hover{background:rgba(212,168,67,.22)}
.nav-counter{font-size:12px;color:#8a7a5a;text-align:center}
.nav-cat{font-size:10px;color:#5a4830;text-align:center;margin-top:3px}

/* ── Action Row ── */
.action-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.action-btn{padding:8px 14px;border-radius:9px;font-family:Georgia,serif;font-size:11px;cursor:pointer;transition:all .2s}
.btn-master{border:2px solid rgba(74,154,74,.5);background:rgba(74,154,74,.15);color:#8ade8a}
.btn-random{border:2px solid rgba(212,168,67,.5);background:rgba(212,168,67,.15);color:#f0c96a}
.btn-reverse{border:2px solid rgba(100,160,220,.45);background:rgba(100,160,220,.15);color:#80b8e8}
.btn-quiz{border:2px solid rgba(220,140,80,.45);background:rgba(220,140,80,.15);color:#e8a870}
.btn-reverse.on{background:rgba(100,160,220,.3);border-color:#80b8e8}

/* ── Quiz Banner ── */
.quiz-banner{background:linear-gradient(135deg,rgba(180,80,30,.22),rgba(212,168,67,.12));border:2px solid rgba(200,90,30,.5);border-radius:13px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.quiz-banner-text{font-size:13px;color:#e8a870}
.quiz-banner-btns{display:flex;gap:8px}
.quiz-banner-btn{padding:7px 13px;border-radius:8px;font-family:Georgia,serif;font-size:11px;cursor:pointer}
.qbb-take{border:1px solid #e8a870;background:rgba(200,100,30,.2);color:#e8a870}
.qbb-skip{border:1px solid #6a5040;background:transparent;color:#6a5040}

/* ── Quiz Setup Panel ── */
.qsetup{background:rgba(0,0,0,.2);border-radius:16px;padding:16px;margin-bottom:0}
.qsetup-header{text-align:center;margin-bottom:18px}
.qsetup-icon{font-size:32px;margin-bottom:6px}
.qsetup-title{font-size:18px;color:#f0c96a;font-weight:bold}
.qsetup-sub{font-size:11px;color:#7a6040;margin-top:4px}
.qsetup-section{margin-bottom:16px}
.qsetup-label{font-size:11px;color:#9a8060;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:bold}
.qsetup-chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 13px;border-radius:20px;border:2px solid rgba(212,168,67,.25);background:rgba(255,255,255,.03);color:#8a7a5a;font-family:Georgia,serif;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.on{border-color:#f0c96a;background:rgba(212,168,67,.2);color:#f0c96a}
.chip.on-green{border-color:#6adc6a;background:rgba(74,154,74,.2);color:#8ade8a}
.chip.on-blue{border-color:#80b8e8;background:rgba(80,130,200,.2);color:#80b8e8}
.chip.on-orange{border-color:#e8a870;background:rgba(200,130,70,.2);color:#e8a870}
.qsetup-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.cat-chip{padding:8px 10px;border-radius:10px;border:2px solid rgba(212,168,67,.2);background:rgba(255,255,255,.025);color:#8a7a5a;font-family:Georgia,serif;font-size:10px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4}
.cat-chip.on{border-color:#f0c96a;background:rgba(212,168,67,.18);color:#f0c96a}
.qsetup-preview{text-align:center;padding:12px;background:rgba(212,168,67,.07);border:1px solid rgba(212,168,67,.2);border-radius:10px;margin-bottom:14px;font-size:12px;color:#b09060}
.qsetup-preview strong{color:#f0c96a;font-size:15px}
.qsetup-launch{width:100%;padding:14px;border-radius:12px;border:2px solid #d4a843;background:linear-gradient(135deg,rgba(212,168,67,.25),rgba(212,168,67,.1));color:#f0c96a;font-family:Georgia,serif;font-size:16px;cursor:pointer;transition:all .2s;font-weight:bold}
.qsetup-launch:hover{background:linear-gradient(135deg,rgba(212,168,67,.4),rgba(212,168,67,.2))}
/* ── Quiz ── */
.quiz-prog-row{display:flex;justify-content:space-between;font-size:11px;color:#6a5040;margin-bottom:12px}
.quiz-type-tag{font-size:11px;padding:2px 8px;border-radius:10px}
.quiz-type-normal{color:#c8a050}
.quiz-type-reverse{color:#80a8d0}
.quiz-card{background:linear-gradient(145deg,#1a150a,#251a00);border:2px solid rgba(212,168,67,.4);border-radius:18px;padding:24px 20px;margin-bottom:14px;text-align:center}
.quiz-card-label{font-size:10px;color:#6a5030;margin-bottom:6px}
.quiz-q-en{font-size:clamp(14px,3vw,20px);color:#e8d5b7}
.quiz-q-kn{font-size:clamp(30px,6vw,48px);color:#f0c96a;line-height:1.2}
.quiz-q-rom{font-size:13px;color:#d4a843;font-style:italic;margin-top:4px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{padding:12px 8px;border-radius:12px;border:2px solid rgba(212,168,67,.3);background:rgba(255,255,255,.03);color:#f0c96a;font-family:Georgia,serif;font-size:clamp(18px,3.5vw,28px);cursor:pointer;transition:all .2s;line-height:1.25;display:flex;flex-direction:column;align-items:center;justify-content:center}
.opt-btn.correct{border-color:#4a9a4a;background:rgba(74,154,74,.18);color:#8ade8a}
.opt-btn.wrong{border-color:#9a3030;background:rgba(154,48,48,.18);color:#de8a8a}
.opt-btn:not([disabled]):hover{background:rgba(212,168,67,.15)}
.opt-rom{font-size:10px;color:#c8a030;margin-top:3px;font-style:italic;font-size:11px}
.opt-en{font-size:clamp(11px,2.5vw,15px);color:#e0c890}
.quiz-result{text-align:center;padding:10px;border-radius:9px;margin-bottom:10px;margin-top:12px;font-size:14px}
.quiz-result.ok{background:rgba(74,154,74,.14);color:#8ade8a}
.quiz-result.fail{background:rgba(154,48,48,.14);color:#de8a8a}
.quiz-result-sub{font-size:11px;margin-top:4px;color:#b0906a}
.quiz-next-wrap{text-align:center}

/* ── Quiz Done ── */
.quiz-done{text-align:center;padding-top:16px}
.quiz-done-icon{font-size:36px;margin-bottom:10px}
.quiz-done-title{font-size:22px;color:#f0c96a;margin-bottom:6px}
.quiz-done-score{font-size:38px;font-weight:bold;color:#8ade8a;margin-bottom:4px}
.quiz-done-sub{font-size:13px;color:#8a7050;margin-bottom:20px}
.quiz-done-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ── Stats ── */
.stats-title{font-size:15px;color:#f0c96a;margin-bottom:14px;font-weight:bold}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:12px;padding:13px 8px;text-align:center}
.stat-num{font-size:22px;color:#f0c96a;font-weight:bold}
.stat-num.seen{color:#80b8e8}
.stat-num.mastered{color:#8ade8a}
.stat-label{font-size:10px;color:#6a5a4a;margin-top:3px}
.stats-sub{margin-bottom:10px;font-size:12px;color:#7a6040}
.cat-stat{margin-bottom:10px}
.cat-stat-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.cat-stat-name{color:#d4a843}
.cat-stat-count{color:#6a5a40}
.stats-btns{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-danger{border:2px solid rgba(200,80,80,.4);background:rgba(154,48,48,.1);color:#de8a8a;padding:10px 18px;border-radius:10px;font-family:Georgia,serif;font-size:11px;cursor:pointer}
</style>
</head>
<body>

<div id="app"></div>

// DATA HELPERS
// ═══════════════════════════════════════════════════════════════════════
const ALL_CARDS = Object.entries(DECK).flatMap(([cat,cards])=>cards.map(c=>({...c,category:cat})));
const CATEGORIES = Object.keys(DECK);
const TOTAL = ALL_CARDS.length;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function makeQuiz(card, allCards, reverse=false){
  if(reverse){
    const pool=allCards.filter(c=>c.en!==card.en);
    const dist=shuffle(pool).slice(0,3).map(c=>({label:c.en,value:c.en}));
    return{card,options:shuffle([{label:card.en,value:card.en},...dist]),correctValue:card.en,reverse:true};
  }else{
    const pool=allCards.filter(c=>c.kn!==card.kn);
    const dist=shuffle(pool).slice(0,3).map(c=>({label:c.kn,sub:c.rom,value:c.kn}));
    return{card,options:shuffle([{label:card.kn,sub:card.rom,value:card.kn},...dist]),correctValue:card.kn,reverse:false};
  }
}

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
const S={
  mode:'learn',
  selectedCat:'ALL',
  cardIndex:0,
  flipped:false,
  reverseMode:false,
  seen:new Set(),
  mastered:new Set(),
  quizPool:[],
  quizIdx:0,
  quizState:null,
  quizScore:{right:0,wrong:0},
  showQuizBanner:false,
  learnCount:0,
  qs:{cats:new Set(['ALL']),count:20,direction:'mixed',filter:'all'},
};

function getFiltered(){
  if(S.selectedCat==='ALL') return ALL_CARDS;
  return (DECK[S.selectedCat]||[]).map(c=>({...c,category:S.selectedCat}));
}

function buildQuizPool(){
  const qs=S.qs;
  let pool=qs.cats.has('ALL')?[...ALL_CARDS]:ALL_CARDS.filter(c=>qs.cats.has(c.category));

  if(qs.filter==='unseen') pool=pool.filter(c=>!S.seen.has(c.kn));
  else if(qs.filter==='unmastered') pool=pool.filter(c=>!S.mastered.has(c.kn));

  if(pool.length<4){
    pool=qs.cats.has('ALL')?[...ALL_CARDS]:ALL_CARDS.filter(c=>qs.cats.has(c.category));
    if(pool.length<4) pool=[...ALL_CARDS];
  }

  const requestedCount=qs.count==='max'?pool.length:Math.max(1,Number(qs.count)||20);

  const quizItems=[];

  for(let i=0;i<requestedCount;i++){
    const c=pool[Math.floor(Math.random()*pool.length)];
    const rev=qs.direction==='kn-en'?true:qs.direction==='en-kn'?false:Math.random()>0.5;
    quizItems.push(makeQuiz(c,ALL_CARDS,rev));
  }

  return shuffle(quizItems);
}

function launchQuiz(){
  S.quizPool=buildQuizPool();
  S.quizIdx=0; S.quizState=null; S.quizScore={right:0,wrong:0};
  S.showQuizBanner=false;
  render();
}

function startQuiz(mixReverse=true){
  // Quick-launch: respect category but use defaults otherwise
  S.qs.direction=mixReverse?'mixed':'en-kn';
  S.quizPool=buildQuizPool();
  S.quizIdx=0; S.quizState=null; S.quizScore={right:0,wrong:0};
  S.showQuizBanner=false; S.mode='quiz';
  render();
}

function e(tag,attrs='',children=''){return `<${tag} ${attrs}>${children}</${tag}>`;}
function pct(n,d){return Math.round((n/Math.max(d,1))*100);}

function renderHeader(){
  return`<div class="header">
    <div>
      <div class="header-title">ಕನ್ನಡ ಕಲಿಯೋಣ · Learn Kannada</div>
      <div class="header-sub">${TOTAL}+ Flashcards · Basics to Advanced</div>
    </div>
    <div class="header-stats">${S.seen.size}/${TOTAL} seen<span>${S.mastered.size} mastered ✓</span></div>
  </div>`;
}

function renderTabs(){
  const tabs=[['learn','📖 Learn'],['quiz','🧠 Quiz'],['stats','📊 Progress']];
  return`<div class="tabs">${tabs.map(([m,l])=>`<button class="tab ${S.mode===m?'active':''}" onclick="setMode('${m}')">${l}</button>`).join('')}</div>`;
}

function renderProgBar(val){
  return`<div class="prog-bar"><div class="prog-fill" style="width:${val}%"></div></div>`;
}

function renderLearn(){
  const filtered=getFiltered();
  const card=filtered[S.cardIndex]||filtered[0];
  if(!card) return '<p style="color:#888;text-align:center">No cards in this category.</p>';

  // Cat grid
  let catGrid=`<div class="cat-label">Choose category:</div><div class="cat-grid">`;
  catGrid+=`<button class="cat-btn ${S.selectedCat==='ALL'?'active':''}" onclick="selectCat('ALL')">🌟 All<br><small>${TOTAL} cards</small></button>`;
  CATEGORIES.forEach(cat=>{
    const safe=cat.replace(/'/g,"\\'");
    catGrid+=`<button class="cat-btn ${S.selectedCat===cat?'active':''}" onclick="selectCat('${safe}')">${cat}<br><small>${DECK[cat].length} cards</small></button>`;
  });
  catGrid+='</div>';

  // Progress
  const prog=pct(S.seen.size,TOTAL);
  const progHTML=renderProgBar(prog)+`<div class="prog-label">${prog}% of full deck seen</div>`;

  // Flashcard faces
  const isMastered=S.mastered.has(card.kn);
  const front=S.reverseMode
    ?{top:'ಕನ್ನಡ',main:`<div class="card-kn">${card.kn}</div>`,hint:'What is the English meaning?'}
    :{top:'English',main:`<div class="card-en">${card.en}</div>`,hint:'Tap to reveal Kannada ↻'};
  const back=S.reverseMode
    ?{top:'English meaning',main:`<div class="card-en">${card.en}</div>`,rom:'',tip:card.tip}
    :{top:'ಕನ್ನಡ · Kannada',main:`<div class="card-kn">${card.kn}</div>`,rom:card.rom,tip:card.tip};

  const cardHTML=`<div class="card-wrap" onclick="flipCard()">
    <div class="card-inner ${S.flipped?'flipped':''}" id="cardInner">
      <div class="card-face front">
        <div class="card-badge">${card.category}</div>
        ${isMastered?'<div class="card-mastered">✓ mastered</div>':''}
        <div class="card-lang">${front.top}</div>
        ${front.main}
        <div class="card-hint-text">${front.hint}</div>
        <div class="card-flip-hint">tap to flip ↻</div>
      </div>
      <div class="card-face back">
        <div class="card-lang" style="color:#4a8a4a">${back.top}</div>
        ${back.main}
        ${back.rom?`<div class="card-rom">${back.rom}</div>`:''}
        ${back.tip?`<div class="card-tip">💡 ${back.tip}</div>`:''}
        <div class="card-flip-hint">tap to flip back ↻</div>
      </div>
    </div>
  </div>`;

  // Nav
  const nav=`<div class="nav-row">
    <button class="nav-btn" onclick="navCard(-1)">← Prev</button>
    <div><div class="nav-counter">${S.cardIndex+1} / ${filtered.length}</div>
    <div class="nav-cat">${S.selectedCat==='ALL'?'All Categories':S.selectedCat}</div></div>
    <button class="nav-btn" onclick="navCard(1)">Next →</button>
  </div>`;

  const actions=`<div class="action-row">
    <button class="action-btn btn-master" onclick="markMastered()">✓ Mastered</button>
    <button class="action-btn btn-random" onclick="randomCard()">🔀 Random</button>
    <button class="action-btn btn-reverse ${S.reverseMode?'on':''}" onclick="toggleReverse()">${S.reverseMode?'🔄 KN→EN ON':'🔄 Reverse Off'}</button>
    <button class="action-btn btn-quiz" onclick="openQuizSetup()">🧠 Quiz Setup</button>
  </div>`;

  const banner=S.showQuizBanner?`<div class="quiz-banner">
    <span class="quiz-banner-text">🎯 Quiz time! Test what you've learned</span>
    <div class="quiz-banner-btns">
      <button class="quiz-banner-btn qbb-take" onclick="openQuizSetup()">Configure Quiz</button>
      <button class="quiz-banner-btn qbb-skip" onclick="dismissBanner()">Skip</button>
    </div>
  </div>`:'';

  return banner+catGrid+progHTML+cardHTML+nav+actions;
}

function quizPoolPreview(){
  const qs=S.qs;
  let pool=qs.cats.has('ALL')?[...ALL_CARDS]:ALL_CARDS.filter(c=>qs.cats.has(c.category));
  if(qs.filter==='unseen') pool=pool.filter(c=>!S.seen.has(c.kn));
  else if(qs.filter==='unmastered') pool=pool.filter(c=>!S.mastered.has(c.kn));
  if(pool.length<4){
    pool=qs.cats.has('ALL')?[...ALL_CARDS]:ALL_CARDS.filter(c=>qs.cats.has(c.category));
    if(pool.length<4) pool=[...ALL_CARDS];
  }
  const count=qs.count==='max'?pool.length:Math.min(Number(qs.count),pool.length);
  return{available:pool.length,count};
}

function renderQuizSetup(){
  const qs=S.qs;
  const dirOpts=[['mixed','🎲 Mixed'],['en-kn','📖 EN → KN'],['kn-en','🔄 KN → EN']];
  const cntOpts=[10,20,30,50,'max'];
  const filtOpts=[['all','All Cards'],['unseen','Unseen Only'],['unmastered','Not Mastered']];

  // Category chips
  const allChip=`<button class="cat-chip ${qs.cats.has('ALL')?'on':''}" onclick="toggleQCat('ALL')">🌟 All Categories<br><small>${TOTAL} cards</small></button>`;
  const catChips=CATEGORIES.map(cat=>{
    const safe=cat.replace(/'/g,"\\'");
    const active=!qs.cats.has('ALL')&&qs.cats.has(cat);
    return`<button class="cat-chip ${active?'on':''}" onclick="toggleQCat('${safe}')">${cat}<br><small>${DECK[cat].length} cards</small></button>`;
  }).join('');

  // Direction chips
  const dirChips=dirOpts.map(([v,l])=>`<button class="chip ${qs.direction===v?'on-blue':''}" onclick="setQDir('${v}')">${l}</button>`).join('');

  // Count chips
  const cntChips=cntOpts.map(v=>`<button class="chip ${qs.count===v?'on':''}" onclick="setQCount(${v==='max'?"'max'":v})">${v==='max'?'Max':v+' Qs'}</button>`).join('');

  const customCountInput=`<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <input id="customQuizCount" type="number" min="1" value="${typeof qs.count==='number'?qs.count:20}" placeholder="Custom question count"
    style="flex:1;padding:10px 12px;border-radius:10px;border:2px solid rgba(212,168,67,.25);background:rgba(255,255,255,.03);color:#f0c96a;font-family:Georgia,serif;font-size:12px;outline:none">
    <button class="chip on" onclick="applyCustomQuizCount()">Set Custom</button>
  </div>`;

  // Filter chips
  const filtChips=filtOpts.map(([v,l])=>`<button class="chip ${qs.filter===v?'on-green':''}" onclick="setQFilter('${v}')">${l}</button>`).join('');

  const {available,count}=quizPoolPreview();
  const preview=`<div class="qsetup-preview">Ready to generate <strong>${count}</strong> questions from <strong>${available}</strong> matching cards</div>`;

  return`<div class="qsetup">
    <div class="qsetup-header">
      <div class="qsetup-icon">🧠</div>
      <div class="qsetup-title">Configure Your Quiz</div>
      <div class="qsetup-sub">Mix categories, direction, and filters your way</div>
    </div>

    <div class="qsetup-section">
      <div class="qsetup-label">📚 Categories</div>
      <div class="qsetup-cat-grid">${allChip}${catChips}</div>
    </div>

    <div class="qsetup-section">
      <div class="qsetup-label">🔢 Questions</div>
      <div class="qsetup-chips">${cntChips}</div>${customCountInput}
    </div>

    <div class="qsetup-section">
      <div class="qsetup-label">↔️ Direction</div>
      <div class="qsetup-chips">${dirChips}</div>
    </div>

    <div class="qsetup-section">
      <div class="qsetup-label">🎯 Card Filter</div>
      <div class="qsetup-chips">${filtChips}</div>
    </div>

    ${preview}
    <button class="qsetup-launch" onclick="launchQuiz()">▶ Start Quiz</button>
  </div>`;
}

function applyCustomQuizCount(){const el=document.getElementById("customQuizCount");const val=Math.max(1,parseInt(el.value||"20",10));S.qs.count=val;render();}

function renderQuiz(){
  if(S.quizPool.length===0){
    return renderQuizSetup();
  }

  if(S.quizIdx>=S.quizPool.length){
    const sc=S.quizScore;
    const pctScore=Math.round((sc.right/S.quizPool.length)*100);
    const icon=pctScore>=85?'🌟':pctScore>=60?'👍':'📚';
    const msg=pctScore>=85?'Excellent!':pctScore>=60?'Good work!':'Keep practising!';
    return`<div class="quiz-done">
      <div class="quiz-done-icon">${icon}</div>
      <div class="quiz-done-title">Quiz Complete!</div>
      <div class="quiz-done-score">${sc.right}/${S.quizPool.length}</div>
      <div class="quiz-done-sub">${pctScore}% accuracy · ${msg}</div>
      <div class="quiz-done-btns">
        <button class="nav-btn" onclick="launchQuiz()">🔄 Try Again</button>
        <button class="nav-btn" style="color:#80b8e8;border-color:rgba(80,130,200,.4)" onclick="resetAndConfigure()">⚙️ New Config</button>
        <button class="nav-btn" style="color:#d4a843" onclick="setMode('learn')">📖 Back to Learn</button>
      </div>
    </div>`;
  }

  const q=S.quizPool[S.quizIdx];
  const prog=pct(S.quizIdx,S.quizPool.length);

  const progRow=renderProgBar(prog)+`<div class="quiz-prog-row">
    <span>Q ${S.quizIdx+1}/${S.quizPool.length}</span>
    <span class="quiz-type-tag ${q.reverse?'quiz-type-reverse':'quiz-type-normal'}">${q.reverse?'🔄 KN → EN':'📖 EN → KN'}</span>
    <span><span style="color:#8ade8a">✓${S.quizScore.right}</span> <span style="color:#de8a8a">✗${S.quizScore.wrong}</span></span>
  </div>`;

  const qCardContent=q.reverse
    ?`<div class="quiz-card-label">What is the English meaning of:</div>
       <div class="quiz-q-kn">${q.card.kn}</div>
       <div class="quiz-q-rom">${q.card.rom}</div>`
    :`<div class="quiz-card-label">Choose the correct Kannada for:</div>
       <div class="quiz-q-en">${q.card.en}</div>`;

  const opts=q.options.map((opt,i)=>{
    let cls='';
    if(S.quizState){
      if(opt.value===S.quizState.correct) cls='correct';
      else if(opt.value===S.quizState.chosen) cls='wrong';
    }
    const disabled=S.quizState?'disabled':''
    const content=q.reverse
      ?`<span class="opt-en">${opt.label}</span>`
      :`${opt.label}${opt.sub?`<span class="opt-rom">${opt.sub}</span>`:''}`;
    return`<button class="opt-btn ${cls}" ${disabled} onclick="answerQuiz('${opt.value.replace(/'/g,"\\'")}')">${content}</button>`;
  }).join('');

  let resultHTML='';
  if(S.quizState){
    const ok=S.quizState.ok;
    const answerDisplay=ok?'✓ Correct!':`✗ Correct answer: <strong>${S.quizState.correct}</strong>`;
    const romNote=(!ok&&!q.reverse&&q.card.rom)?`<div class="quiz-result-sub">/${q.card.rom}/</div>`:'';
    resultHTML=`<div class="quiz-result ${ok?'ok':'fail'}">${answerDisplay}${romNote}</div>
    <div class="quiz-next-wrap"><button class="nav-btn" onclick="nextQuiz()">${S.quizIdx+1>=S.quizPool.length?'See Results 🏆':'Next →'}</button></div>`;
  }

  return`${progRow}<div class="quiz-card">${qCardContent}</div><div class="opt-grid">${opts}</div>${resultHTML}`;
}

function renderStats(){
  const prog=pct(S.seen.size,TOTAL);
  const grid=`<div class="stats-grid">
    <div class="stat-box"><div class="stat-num">${TOTAL}</div><div class="stat-label">Total Cards</div></div>
    <div class="stat-box"><div class="stat-num seen">${S.seen.size}</div><div class="stat-label">Seen</div></div>
    <div class="stat-box"><div class="stat-num mastered">${S.mastered.size}</div><div class="stat-label">Mastered</div></div>
  </div>`;
  const cats=CATEGORIES.map(cat=>{
    const c=DECK[cat];
    const sc=c.filter(x=>S.seen.has(x.kn)).length;
    const mc=c.filter(x=>S.mastered.has(x.kn)).length;
    const p=pct(sc,c.length);
    return`<div class="cat-stat">
      <div class="cat-stat-row"><span class="cat-stat-name">${cat}</span><span class="cat-stat-count">${sc}/${c.length} seen · ${mc} ✓</span></div>
      ${renderProgBar(p)}
    </div>`;
  }).join('');
  return`<div class="stats-title">Your Progress</div>${grid}<div class="stats-sub">Category breakdown:</div>${cats}
  <div class="stats-btns">
    <button class="nav-btn" onclick="openQuizSetup()">🧠 Configure Quiz</button>
    <button class="btn-danger" onclick="resetProgress()">🔄 Reset Progress</button>
  </div>`;
}

function render(){
  const bodyContent=S.mode==='learn'?renderLearn():S.mode==='quiz'?renderQuiz():renderStats();
  document.getElementById('app').innerHTML=renderHeader()+renderTabs()+`<div class="body">${bodyContent}</div>`;
}

// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════════
function openQuizSetup(){S.quizPool=[];S.mode='quiz';render();}

function setMode(m){S.mode=m;if(m==='quiz')S.quizPool=[];render();}

function selectCat(cat){
  S.selectedCat=cat; S.cardIndex=0; S.flipped=false;
  const filtered=getFiltered();
  if(filtered[0]) S.seen.add(filtered[0].kn);
  render();
}

function flipCard(){S.flipped=!S.flipped;render();}

function navCard(dir){
  S.flipped=false;
  const filtered=getFiltered();
  let n=S.cardIndex+dir;
  if(n<0) n=filtered.length-1;
  if(n>=filtered.length) n=0;
  S.cardIndex=n;
  if(filtered[n]){
    S.seen.add(filtered[n].kn);
    S.learnCount++;
    if(S.learnCount>0&&S.learnCount%8===0) S.showQuizBanner=true;
  }
  render();
}

function randomCard(){
  const filtered=getFiltered();
  S.cardIndex=Math.floor(Math.random()*filtered.length);
  S.flipped=false;
  if(filtered[S.cardIndex]) S.seen.add(filtered[S.cardIndex].kn);
  render();
}

function markMastered(){
  const filtered=getFiltered();
  const card=filtered[S.cardIndex];
  if(card) S.mastered.add(card.kn);
  navCard(1);
}

function toggleReverse(){S.reverseMode=!S.reverseMode;S.flipped=false;render();}

function dismissBanner(){S.showQuizBanner=false;render();}

function toggleQCat(cat){
  if(cat==='ALL'){S.qs.cats=new Set(['ALL']);}
  else{
    S.qs.cats.delete('ALL');
    if(S.qs.cats.has(cat)) S.qs.cats.delete(cat);
    else S.qs.cats.add(cat);
    if(S.qs.cats.size===0) S.qs.cats.add('ALL');
  }
  render();
}
function setQCount(v){S.qs.count=v;render();}
function setQDir(v){S.qs.direction=v;render();}
function setQFilter(v){S.qs.filter=v;render();}
function resetAndConfigure(){S.quizPool=[];render();}

function answerQuiz(val){
  if(S.quizState) return;
  const q=S.quizPool[S.quizIdx];
  const ok=val===q.correctValue;
  S.quizState={chosen:val,correct:q.correctValue,ok};
  S.quizScore={right:S.quizScore.right+(ok?1:0),wrong:S.quizScore.wrong+(ok?0:1)};
  render();
}

function nextQuiz(){
  S.quizIdx++;
  S.quizState=null;
  render();
}

function resetProgress(){
  if(confirm('Reset all progress? This cannot be undone.')){
    S.seen=new Set(); S.mastered=new Set(); S.learnCount=0; S.showQuizBanner=false;
    render();
  }
}

window.onload=function(){
  // Mark first card seen
  const first=ALL_CARDS[0];
  if(first) S.seen.add(first.kn);
  render();
};

<script>
(function(){

function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

window.quizzylingo = {
    originalSet: [],
    currentSet: [],
    currentIndex: 0,
    score: 0
};

function getAllCards(){
    const all = [];
    Object.keys(DECK).forEach(cat=>{
        DECK[cat].forEach(card=>{
            all.push({...card, category:cat});
        });
    });
    return all;
}

function generateQuizzylingo(count){
    const all = getAllCards();
    const selected = [];

    for(let i=0;i<count;i++){
        selected.push(all[Math.floor(Math.random()*all.length)]);
    }

    window.quizzylingo.originalSet = [...selected];
    window.quizzylingo.currentSet = shuffle(selected);
    window.quizzylingo.currentIndex = 0;
    window.quizzylingo.score = 0;

    renderQuizzylingoQuestion();
}

function renderQuizzylingoQuestion(){

    const app = document.getElementById('app');

    if(window.quizzylingo.currentIndex >= window.quizzylingo.currentSet.length){

        app.innerHTML = `
        <div class="body">
            <div class="quiz-done">
                <div class="quiz-done-icon">🔥</div>
                <div class="quiz-done-title">Quizzylingo Complete!</div>
                <div class="quiz-done-score">${window.quizzylingo.score}/${window.quizzylingo.currentSet.length}</div>
                <div class="quiz-done-sub">
                    Repeat the SAME cards again in a new random order for reinforcement learning.
                </div>

                <div class="quiz-done-btns">
                    <button class="nav-btn" id="repeatQuizzyBtn">Repeat Same Cards</button>
                    <button class="nav-btn" onclick="location.reload()">Exit</button>
                </div>
            </div>
        </div>
        `;

        document.getElementById('repeatQuizzyBtn').onclick = function(){
            window.quizzylingo.currentSet = shuffle(window.quizzylingo.originalSet);
            window.quizzylingo.currentIndex = 0;
            window.quizzylingo.score = 0;
            renderQuizzylingoQuestion();
        };

        return;
    }

    const current = window.quizzylingo.currentSet[window.quizzylingo.currentIndex];

    const all = getAllCards();
    const options = [current];

    while(options.length < 4){
        const random = all[Math.floor(Math.random()*all.length)];
        if(!options.find(o=>o.kn===random.kn)){
            options.push(random);
        }
    }

    const shuffled = shuffle(options);

    app.innerHTML = `
    <div class="body">

        <div class="quiz-prog-row">
            <div>Quizzylingo Mode</div>
            <div>${window.quizzylingo.currentIndex+1}/${window.quizzylingo.currentSet.length}</div>
        </div>

        <div class="quiz-card">
            <div class="quiz-card-label">Translate this sentence</div>
            <div class="quiz-q-en">${current.en}</div>
        </div>

        <div class="opt-grid">
            ${shuffled.map((opt,i)=>`
                <button class="opt-btn" data-correct="${opt.kn===current.kn}">
                    <div>${opt.kn}</div>
                    <div class="opt-rom">${opt.rom}</div>
                </button>
            `).join('')}
        </div>

    </div>
    `;

    document.querySelectorAll('.opt-btn').forEach(btn=>{
        btn.onclick = function(){

            const correct = btn.dataset.correct === 'true';

            if(correct){
                btn.classList.add('correct');
                window.quizzylingo.score++;
            }else{
                btn.classList.add('wrong');
            }

            document.querySelectorAll('.opt-btn').forEach(b=>{
                b.disabled = true;
                if(b.dataset.correct === 'true'){
                    b.classList.add('correct');
                }
            });

            setTimeout(()=>{
                window.quizzylingo.currentIndex++;
                renderQuizzylingoQuestion();
            },800);
        };
    });
}

document.addEventListener('DOMContentLoaded',()=>{

    const qsetup = document.querySelector('.qsetup');

    if(!qsetup) return;

    const section = document.createElement('div');

    section.innerHTML = `
        <div class="qsetup-section" style="margin-top:20px;">
            <div class="qsetup-label">QUIZZYLINGO MODE</div>

            <div class="qsetup-preview">
                Random cards mixed from ALL categories.<br>
                Same cards repeat forever in new random order after completion.

            <input
                id="quizzyCountReal"

});

</script>


<script>
(function(){
  function shuffleLocal(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function getAllCardsLocal(){
    return [...ALL_CARDS];
  }

  function buildQuizzyPool(count){
    const all = getAllCardsLocal();
    const total = Math.max(1, parseInt(count, 10) || 50);
    const items = [];
    for(let i=0;i<total;i++){
      const c = all[Math.floor(Math.random() * all.length)];
      const rev = Math.random() > 0.5;
      items.push(makeQuiz(c, all, rev));
    }
    return shuffleLocal(items);
  }

  function ensureQuizzyState(){
    if(!S.quizzy){
      S.quizzy = {
        active:false,
        count:50,
        originalPool:[],
      };
    }
    return S.quizzy;
  }

  window.launchQuizzylingo = function(){
    const qz = ensureQuizzyState();
    const input = document.getElementById('quizzyCountCustom');
    const count = Math.max(1, parseInt(input && input.value ? input.value : String(qz.count || 50), 10) || 50);

    qz.active = true;
    qz.count = count;
    qz.originalPool = buildQuizzyPool(count);

    S.quizPool = [...qz.originalPool];
    S.quizIdx = 0;
    S.quizState = null;
    S.quizScore = {right:0, wrong:0};
    S.showQuizBanner = false;
    S.mode = 'quiz';
    render();
  };

  window.repeatQuizzylingo = function(){
    const qz = ensureQuizzyState();
    if(!qz.originalPool || qz.originalPool.length === 0) return;
    S.quizPool = shuffleLocal(qz.originalPool);
    S.quizIdx = 0;
    S.quizState = null;
    S.quizScore = {right:0, wrong:0};
    S.mode = 'quiz';
    render();
  };

  window.startNewQuizzylingo = function(){
    const qz = ensureQuizzyState();
    qz.active = true;
    launchQuizzylingo();
  };

  const originalRenderQuizSetup = renderQuizSetup;
  renderQuizSetup = function(){
    const qs = S.qs;
    const dirOpts=[['mixed','🎲 Mixed'],['en-kn','📖 EN → KN'],['kn-en','🔄 KN → EN']];
    const cntOpts=[10,20,30,50,'max'];
    const filtOpts=[['all','All Cards'],['unseen','Unseen Only'],['unmastered','Not Mastered']];

    const allChip=`<button class="cat-chip ${qs.cats.has('ALL')?'on':''}" onclick="toggleQCat('ALL')">🌟 All Categories<br><small>${TOTAL} cards</small></button>`;
    const catChips=CATEGORIES.map(cat=>{
      const safe=cat.replace(/'/g,"\\'");
      const active=!qs.cats.has('ALL')&&qs.cats.has(cat);
      return`<button class="cat-chip ${active?'on':''}" onclick="toggleQCat('${safe}')">${cat}<br><small>${DECK[cat].length} cards</small></button>`;
    }).join('');

    const dirChips=dirOpts.map(([v,l])=>`<button class="chip ${qs.direction===v?'on-blue':''}" onclick="setQDir('${v}')">${l}</button>`).join('');
    const cntChips=cntOpts.map(v=>`<button class="chip ${qs.count===v?'on':''}" onclick="setQCount(${v==='max'?"'max'":v})">${v==='max'?'Max':v+' Qs'}</button>`).join('');

    const customCountInput=`<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="customQuizCount" type="number" min="1" value="${typeof qs.count==='number'?qs.count:20}" placeholder="Custom question count"
      style="flex:1;padding:10px 12px;border-radius:10px;border:2px solid rgba(212,168,67,.25);background:rgba(255,255,255,.03);color:#f0c96a;font-family:Georgia,serif;font-size:12px;outline:none">
      <button class="chip on" onclick="applyCustomQuizCount()">Set Custom</button>
    </div>`;

    const filtChips=filtOpts.map(([v,l])=>`<button class="chip ${qs.filter===v?'on-green':''}" onclick="setQFilter('${v}')">${l}</button>`).join('');

    const {available,count}=quizPoolPreview();
    const preview=`<div class="qsetup-preview">Ready to generate <strong>${count}</strong> questions from <strong>${available}</strong> matching cards</div>`;

    const quizzyPreview = `<div class="qsetup-preview">
      Random mixed cards from <strong>all categories</strong>.<br>
      After the set ends, you can repeat the <strong>same cards</strong> in a new random order.
    </div>`;

    return`<div class="qsetup">
      <div class="qsetup-header">
        <div class="qsetup-icon">🧠</div>
        <div class="qsetup-title">Configure Your Quiz</div>
        <div class="qsetup-sub">Mix categories, direction, and filters your way</div>
      </div>

      <div class="qsetup-section">
        <div class="qsetup-label">📚 Categories</div>
        <div class="qsetup-cat-grid">${allChip}${catChips}</div>
      </div>

      <div class="qsetup-section">
        <div class="qsetup-label">🔢 Questions</div>
        <div class="qsetup-chips">${cntChips}</div>${customCountInput}
      </div>

      <div class="qsetup-section">
        <div class="qsetup-label">↔️ Direction</div>
        <div class="qsetup-chips">${dirChips}</div>
      </div>

      <div class="qsetup-section">
        <div class="qsetup-label">🎯 Card Filter</div>
        <div class="qsetup-chips">${filtChips}</div>
      </div>

      ${preview}

      <div class="qsetup-section" style="margin-top:18px">
        <div class="qsetup-label">✨ Quizzylingo Mode</div>
        ${quizzyPreview}
        <input id="quizzyCountCustom"
          type="number"
          min="1"
          value="${(S.quizzy && S.quizzy.count) ? S.quizzy.count : 50}"
          style="width:100%;padding:12px;border-radius:10px;background:rgba(255,255,255,.04);border:2px solid rgba(212,168,67,.25);color:#f0c96a;font-family:Georgia,serif;margin-bottom:10px;">
        <button class="qsetup-launch" onclick="launchQuizzylingo()">▶ Start Quizzylingo</button>
      </div>

      <button class="qsetup-launch" onclick="launchQuiz()">▶ Start Quiz</button>
    </div>`;
  };

  const originalRenderQuiz = renderQuiz;
  renderQuiz = function(){
    const qz = ensureQuizzyState();

    if(qz.active){
      if(S.quizPool.length===0){
        return renderQuizSetup();
      }

      if(S.quizIdx>=S.quizPool.length){
        const sc=S.quizScore;
        const pctScore=Math.round((sc.right/S.quizPool.length)*100);
        const icon=pctScore>=85?'🌟':pctScore>=60?'👍':'📚';
        const msg=pctScore>=85?'Excellent!':pctScore>=60?'Good work!':'Keep practising!';
        return`<div class="quiz-done">
          <div class="quiz-done-icon">${icon}</div>
          <div class="quiz-done-title">Quizzylingo Complete!</div>
          <div class="quiz-done-score">${sc.right}/${S.quizPool.length}</div>
          <div class="quiz-done-sub">${pctScore}% accuracy · ${msg}<br>Repeat the same cards in a new random order.</div>
          <div class="quiz-done-btns">
            <button class="nav-btn" onclick="repeatQuizzylingo()">🔁 Repeat Same Cards</button>
            <button class="nav-btn" style="color:#80b8e8;border-color:rgba(80,130,200,.4)" onclick="launchQuizzylingo()">🎲 New Quizzylingo Set</button>
            <button class="nav-btn" style="color:#d4a843" onclick="(function(){S.quizzy.active=false;resetAndConfigure();})()">⚙️ Back to Setup</button>
          </div>
        </div>`;
      }
    }

    return originalRenderQuiz();
  };

  const originalLaunchQuiz = launchQuiz;
  launchQuiz = function(){
    const qz = ensureQuizzyState();
    qz.active = false;
    originalLaunchQuiz();
  };

  const originalResetAndConfigure = resetAndConfigure;
  resetAndConfigure = function(){
    const qz = ensureQuizzyState();
    qz.active = false;
    originalResetAndConfigure();
  };

})();
</script>

</body>
</html>
