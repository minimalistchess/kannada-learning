.ctp{font-size:11px;color:#7a9a6a;margin-top:9px;font-style:italic}
.cht{font-size:9px;color:rgba(212,168,67,.28);margin-top:12px}

.nb{padding:9px 15px;border-radius:10px;border:2px solid rgba(212,168,67,.4);background:rgba(212,168,67,.12);color:#f0c96a;font-family:Georgia,serif;font-size:13px;cursor:pointer;transition:all .2s}

.nc{font-size:11px;color:#8a7a5a;text-align:center}
.ncs{font-size:9px;color:#5a4830;text-align:center;margin-top:2px}

.ax{border-color:rgba(212,168,67,.5);background:rgba(212,168,67,.15);color:#f0c96a}

.nr2{text-align:center;padding:30px 20px;color:#7a6a5a;font-size:14px}

.qst{font-size:17px;color:#f0c96a;font-weight:bold}

.chip.on{border-color:#f0c96a;background:rgba(212,168,67,.2);color:#f0c96a}
.chip.og{border-color:#6adc6a;background:rgba(74,154,74,.18);color:#8ade8a}

.qnw{text-align:center}

.qdi{font-size:36px;margin-bottom:8px}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
.sb{background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.18);border-radius:12px;padding:11px 6px;text-align:center}
.sn{font-size:20px;color:#f0c96a;font-weight:bold}

.sl{font-size:10px;color:#6a5a4a;margin-top:2px}
.ssu{margin-bottom:8px;font-size:11px;color:#7a6040}
.qh{margin-bottom:13px}
.qhr{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:4px;font-size:11px}

.qhi{color:#7a6a50}
.csr{margin-bottom:8px}
.csr-r{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}

.sbtns{margin-top:15px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

.kh{text-align:center;font-size:9px;color:rgba(212,168,67,.28);margin-top:7px}

const AC=Object.entries(D).flatMap(([c,cs])=>cs.map(x=>({...x,category:c})));
const CATS=Object.keys(D);
const TOTAL=AC.length;
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function mkQ(card,all,rev){
  if(rev){const p=all.filter(c=>c.en!==card.en);const d=shuf(p).slice(0,3).map(c=>({l:c.en,v:c.en}));return{card,opts:shuf([{l:card.en,v:card.en},...d]),cv:card.en,rev:true};}
  else{const p=all.filter(c=>c.kn!==card.kn);const d=shuf(p).slice(0,3).map(c=>({l:c.kn,s:c.rom,v:c.kn}));return{card,opts:shuf([{l:card.kn,s:card.rom,v:card.kn},...d]),cv:card.kn,rev:false};}
}
const S={mode:'learn',cat:'ALL',idx:0,flip:false,rev:false,seen:new Set(),mastered:new Set(),bookmarks:new Set(),search:'',showBook:false,
  qpool:[],qi:0,qstate:null,qscore:{r:0,w:0},banner:false,lc:0,streak:0,maxStreak:0,hist:[],lastCards:[],
  qs:{cats:new Set(['ALL']),count:20,dir:'mixed',filter:'all',timer:0}
};
let tmrInt=null,tmrLeft=0;
function gf(){
  let c=S.cat==='ALL'?AC:(D[S.cat]||[]).map(x=>({...x,category:S.cat}));
  if(S.search){const q=S.search.toLowerCase();c=c.filter(x=>x.en.toLowerCase().includes(q)||x.kn.includes(S.search)||x.rom.toLowerCase().includes(q));}
  if(S.showBook)c=c.filter(x=>S.bookmarks.has(x.kn));
  return c;
}
function bp(){
  const qs=S.qs;
  let p=qs.cats.has('ALL')?[...AC]:AC.filter(c=>qs.cats.has(c.category));
  if(qs.filter==='unseen')p=p.filter(c=>!S.seen.has(c.kn));
  else if(qs.filter==='unmastered')p=p.filter(c=>!S.mastered.has(c.kn));
  if(p.length<4){p=qs.cats.has('ALL')?[...AC]:AC.filter(c=>qs.cats.has(c.category));if(p.length<4)p=[...AC];}
  const target=qs.count==='max'?p.length:Number(qs.count);
  let filled=[];
  while(filled.length<target){const need=target-filled.length;filled=filled.concat(shuf(p).slice(0,Math.min(need,p.length)));}
  filled=filled.slice(0,target);
  return filled.map(c=>{const rv=qs.dir==='kn-en'?true:qs.dir==='en-kn'?false:Math.random()>0.5;return mkQ(c,AC,rv);});
}
function prev(){
  const qs=S.qs;
  let p=qs.cats.has('ALL')?[...AC]:AC.filter(c=>qs.cats.has(c.category));
  if(qs.filter==='unseen')p=p.filter(c=>!S.seen.has(c.kn));
  else if(qs.filter==='unmastered')p=p.filter(c=>!S.mastered.has(c.kn));
  if(p.length<4){p=qs.cats.has('ALL')?[...AC]:AC.filter(c=>qs.cats.has(c.category));if(p.length<4)p=[...AC];}
  const count=qs.count==='max'?p.length:Number(qs.count);
  return{avail:p.length,count};
}
function pct(n,d){return Math.round(n/Math.max(d,1)*100);}
function e(h){return h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Timer
function startTmr(){
  clearInterval(tmrInt);
  if(!S.qs.timer)return;
  tmrLeft=S.qs.timer;
  updTmr();
  tmrInt=setInterval(()=>{tmrLeft--;updTmr();if(tmrLeft<=0){clearInterval(tmrInt);autoTO();}},1000);
}
function stopTmr(){clearInterval(tmrInt);tmrInt=null;}
function updTmr(){const el=document.getElementById('qtmr');if(!el)return;el.textContent=tmrLeft+'s';el.className='qtmr '+(tmrLeft>7?'g':tmrLeft>3?'w':'d');}
function autoTO(){if(S.qstate)return;const q=S.qpool[S.qi];S.qstate={chosen:'__to__',correct:q.cv,ok:false};S.qscore.w++;S.streak=0;render();}
// Render
function rHdr(){return`<div class="hdr"><div><div class="hdr-t">ಕನ್ನಡ ಕಲಿಯೋಣ &middot; Learn Kannada</div><div class="hdr-s">${TOTAL}+ Flashcards &middot; Basics to Advanced</div></div><div class="hdr-r">${S.seen.size}/${TOTAL} seen<span>${S.mastered.size} mastered &middot; ${S.bookmarks.size} ★</span></div></div>`;}
function rTabs(){return`<div class="tabs">${[['learn','📖 Learn'],['quiz','🧠 Quiz'],['stats','📊 Stats']].map(([m,l])=>`<button class="tab${S.mode===m?' on':''}" onclick="SM('${m}')">${l}</button>`).join('')}</div>`;}
function rPB(v){return`<div class="pb"><div class="pf" style="width:${v}%"></div></div>`;}
function rLearn(){
  const f=gf(),card=f[S.idx]||f[0];
  const cg=`<div class="cl">Category:</div><div class="cg"><button class="cb${S.cat==='ALL'&&!S.showBook?' on':''}" onclick="SC('ALL')">🌟 All<br><small>${TOTAL}</small></button>${CATS.map(c=>`<button class="cb${S.cat===c&&!S.showBook?' on':''}" onclick="SC('${c.replace(/'/g,"\\'")}')"><span style="font-size:8px">${e(c)}</span><br><small>${D[c].length}</small></button>`).join('')}</div>`;
  const p=pct(S.seen.size,TOTAL);
  const bn=S.banner?`<div class="bn"><span class="bnt">🎯 Quiz time! Test yourself</span><div class="bnb"><button class="qb1" onclick="openQS()">Configure Quiz</button><button class="qb2" onclick="S.banner=false;render()">Skip</button></div></div>`:'';
  if(!card)return bn+cg+`<div class="nr2">No cards found. Try a different search or category.</div>`;
  const isBk=S.bookmarks.has(card.kn),isMast=S.mastered.has(card.kn);
  const front=S.rev?{lang:'ಕನ್ನಡ',main:`<div class="ckn">${card.kn}</div>`,hint:'What is the English meaning?'}:{lang:'English',main:`<div class="cen">${e(card.en)}</div>`,hint:'Tap to reveal Kannada ↻'};
  const back=S.rev?{lang:'English',main:`<div class="cen">${e(card.en)}</div>`,rom:'',tip:card.tip}:{lang:'ಕನ್ನಡ &middot; Kannada',main:`<div class="ckn">${card.kn}</div>`,rom:card.rom,tip:card.tip};
  const cardH=`<div class="cw" onclick="flipCard()"><div class="ci${S.flip?' fl':''}"><div class="cf fr"><div class="cbdg">${e(card.category)}</div><div class="ctr">${isMast?'<span class="cmb">✓</span>':''}<button class="cbb" onclick="event.stopPropagation();tgBk('${card.kn.replace(/'/g,"\\'")}')"><span style="color:${isBk?'#f5c842':'#4a3a2a'}">${isBk?'★':'☆'}</span></button></div><div class="cln">${front.lang}</div>${front.main}<div class="cht">${front.hint}</div><div class="cfh">tap ↻</div></div><div class="cf bk"><div class="cln" style="color:#4a8a4a">${back.lang}</div>${back.main}${back.rom?`<div class="crm">${back.rom}</div>`:''} ${back.tip?`<div class="ctp">💡 ${e(back.tip)}</div>`:''}<div class="cfh">tap ↻</div></div></div></div>`;
  const nav=`<div class="nr"><button class="nb" onclick="nav(-1)">← Prev</button><div><div class="nc">${S.idx+1} / ${f.length}</div><div class="ncs">${S.cat==='ALL'?'All Categories':e(S.cat)}</div></div><button class="nb" onclick="nav(1)">Next →</button></div>`;
  const acts=`<div class="ar"><button class="ab am" onclick="markMast()">✓ Mastered</button><button class="ab ax" onclick="rndCard()">🔀 Random</button><button class="ab av${S.rev?' on':''}" onclick="S.rev=!S.rev;S.flip=false;render()">${S.rev?'🔄 KN→EN':'🔄 Reverse'}</button><button class="ab aq" onclick="openQS()">🧠 Quiz Setup</button></div>`;
  const sr=`<div class="srow"><input class="sinp" id="sinp" placeholder="🔍 Search cards…" value="${e(S.search)}" oninput="doSearch(this.value)"><button class="sbtn${S.showBook?' on':''}" onclick="S.showBook=!S.showBook;S.idx=0;render()">${S.showBook?'★ Bookmarks':'☆ Bookmarks'}</button></div>`;
  return bn+sr+cg+rPB(p)+`<div class="pl">${p}% of full deck seen</div>`+cardH+nav+acts+`<div class="kh">Keyboard: ← → to navigate &nbsp;|&nbsp; Space to flip &nbsp;|&nbsp; M to master</div>`;
}
function rQSetup(){
  const qs=S.qs,{avail,count}=prev(),rep=count>avail;
  const dirs=[['mixed','🎲 Mixed'],['en-kn','📖 EN→KN'],['kn-en','🔄 KN→EN']];
  const filters=[['all','All Cards'],['unseen','Unseen Only'],['unmastered','Not Mastered']];
  const timers=[['0','Off'],['10','10s'],['15','15s'],['30','30s']];
  return`<div class="qs"><div class="qsh"><div class="qsi">🧠</div><div class="qst">Configure Your Quiz</div><div class="qss">Mix categories, direction, count and filters</div></div>
  <div class="qsec"><div class="qsl">📚 Categories</div><div class="ccg">
    <button class="ccat${qs.cats.has('ALL')?' on':''}" onclick="tgQC('ALL')">🌟 All Categories<br><small>${TOTAL} cards</small></button>
    ${CATS.map(c=>`<button class="ccat${!qs.cats.has('ALL')&&qs.cats.has(c)?' on':''}" onclick="tgQC('${c.replace(/'/g,"\\'")}')"><span style="font-size:8px">${e(c)}</span><br><small>${D[c].length}</small></button>`).join('')}
  </div></div>
  <div class="qsec"><div class="qsl">🔢 Questions</div><div class="cr-row">
    <div class="chips">${[10,20,30,50].map(v=>`<button class="chip${qs.count===v?' on':''}" onclick="setQC(${v})">${v}</button>`).join('')}<button class="chip${qs.count==='max'?' on':''}" onclick="setQC('max')">Max</button></div>
    <div class="cstep"><button class="csb" onclick="stepC(-1)">−</button><input class="cinp" id="qcinp" type="number" min="1" max="999" value="${qs.count==='max'?avail:qs.count}" onchange="setQC(Math.max(1,parseInt(this.value)||1))"><button class="csb" onclick="stepC(1)">+</button></div>
  </div></div>
  <div class="qsec"><div class="qsl">↔️ Direction</div><div class="chips">${dirs.map(([v,l])=>`<button class="chip${qs.dir===v?' ob':''}" onclick="S.qs.dir='${v}';render()">${l}</button>`).join('')}</div></div>
  <div class="qsec"><div class="qsl">🎯 Card Filter</div><div class="chips">${filters.map(([v,l])=>`<button class="chip${qs.filter===v?' og':''}" onclick="S.qs.filter='${v}';render()">${l}</button>`).join('')}</div></div>
  <div class="qsec"><div class="qsl">⏱️ Timer per Question</div><div class="chips">${timers.map(([v,l])=>`<button class="chip${String(qs.timer)===v?' oo':''}" onclick="S.qs.timer=${v};render()">${l}</button>`).join('')}</div></div>
  <div class="qprev">Ready to generate <strong>${count}</strong> questions from <strong>${avail}</strong> matching cards${rep?`<span class="rn">★ Cards will repeat to fill ${count} questions</span>`:''}</div>
  <button class="ql" onclick="launchQ()">▶ Start Quiz</button></div>`;
}
function rQuiz(){
  if(!S.qpool.length)return rQSetup();
  if(S.qi>=S.qpool.length){
    const sc=S.qscore,pt=pct(sc.r,S.qpool.length),ic=pt>=85?'🌟':pt>=60?'👍':'📚',msg=pt>=85?'Excellent!':pt>=60?'Good work!':'Keep practising!';
    return`<div class="qd"><div class="qdi">${ic}</div><div class="qdt">Quiz Complete!</div><div class="qds">${sc.r}/${S.qpool.length}</div><div class="qdu">${pt}% accuracy &middot; ${msg}</div>${S.maxStreak>1?`<div class="qdstk">🔥 Best streak: ${S.maxStreak} in a row</div>`:''}<div class="qdb"><button class="nb" onclick="launchQ()">🔄 Try Again</button><button class="nb" style="color:#8ade8a;border-color:rgba(74,154,74,.5)" onclick="repeatQ()">🔀 Repeat Shuffled</button><button class="nb" style="color:#80b8e8;border-color:rgba(80,130,200,.4)" onclick="S.qpool=[];render()">⚙️ New Config</button><button class="nb" style="color:#d4a843" onclick="SM('learn')">📖 Learn</button></div></div>`;
  }
  const q=S.qpool[S.qi],p=pct(S.qi,S.qpool.length);
  const opts=q.opts.map((o,i)=>{
    let cls='';if(S.qstate){if(o.v===S.qstate.correct)cls=' ok2';else if(o.v===S.qstate.chosen)cls=' ng2';}
    const dis=S.qstate?'disabled':'';
    const inner=q.rev?`<span class="oen">${e(o.l)}</span>`:`${o.l}${o.s?`<span class="orm">${o.s}</span>`:''}`;
    return`<button class="ob2${cls}" ${dis} onclick="ansQ('${o.v.replace(/'/g,"\\'")}')"><span>${inner}</span></button>`;
  }).join('');
  const res=S.qstate?`<div class="qres ${S.qstate.ok?'ok':'ng'}">${S.qstate.ok?`✓ Correct! ${S.streak>1?`<span class="stk">🔥 ${S.streak} streak</span>`:''}`:S.qstate.chosen==='__to__'?`⏱ Time's up! Answer: <strong>${e(S.qstate.correct)}</strong>`:`✗ Answer: <strong>${e(S.qstate.correct)}</strong>`}${!S.qstate.ok&&!q.rev?`<div class="qrs">/${q.card.rom}/</div>`:''}</div><div class="qnw"><button class="nb" onclick="nextQ()">${S.qi+1>=S.qpool.length?'See Results 🏆':'Next →'}</button></div>`:'';
  return`${rPB(p)}<div class="qpr"><span>Q ${S.qi+1}/${S.qpool.length}</span><div class="qsr"><span class="qtag ${q.rev?'qtr':'qtn'}">${q.rev?'🔄 KN→EN':'📖 EN→KN'}</span>${S.qs.timer?`<span id="qtmr" class="qtmr g">${S.qs.timer}s</span>`:''}</div><span><span style="color:#8ade8a">✓${S.qscore.r}</span> <span style="color:#de8a8a">✗${S.qscore.w}</span>${S.streak>1?` <span class="stk">🔥${S.streak}</span>`:''}</span></div>
  <div class="qcard"><div class="qcl">${q.rev?'What is the English meaning of:':'Choose the correct Kannada for:'}</div>${q.rev?`<div class="qkn">${q.card.kn}</div><div class="qrom">${q.card.rom}</div>`:`<div class="qen">${e(q.card.en)}</div>`}</div>
  <div class="og2">${opts}</div>${res}<div class="kh">Keys: 1 2 3 4 to answer &nbsp;|&nbsp; Enter/Space for next</div>`;
}
function rStats(){
  const p=pct(S.seen.size,TOTAL);
  const hRows=S.hist.slice(-5).reverse().map((h,i)=>`<div class="qhr"><span class="qhi">#${S.hist.length-i}</span><span class="qhsc">${h.r}/${h.t} (${pct(h.r,h.t)}%)</span><span class="qhi">${h.dir} &middot; ${h.cats}</span></div>`).join('');
  const catRows=CATS.map(c=>{const cs=D[c],sc=cs.filter(x=>S.seen.has(x.kn)).length,mc=cs.filter(x=>S.mastered.has(x.kn)).length,bk=cs.filter(x=>S.bookmarks.has(x.kn)).length,pt=pct(sc,cs.length);
    return`<div class="csr"><div class="csr-r"><span class="csr-n">${e(c)}</span><span class="csr-c">${sc}/${cs.length} seen &middot; ${mc}✓ &middot; ${bk}★</span></div>${rPB(pt)}</div>`;}).join('');
  return`<div class="st">Your Progress</div>
  <div class="sg"><div class="sb"><div class="sn">${TOTAL}</div><div class="sl">Total</div></div><div class="sb"><div class="sn se">${S.seen.size}</div><div class="sl">Seen</div></div><div class="sb"><div class="sn sm">${S.mastered.size}</div><div class="sl">Mastered</div></div><div class="sb"><div class="sn sk">${S.bookmarks.size}</div><div class="sl">Bookmarked</div></div></div>
  ${S.hist.length?`<div class="ssu">Recent quiz results:</div><div class="qh">${hRows}</div>`:''}<div class="ssu">Category breakdown:</div>${catRows}
  <div class="sbtns"><button class="nb" onclick="openQS()">🧠 Configure Quiz</button><button class="bd" onclick="if(confirm('Reset all progress?')){S.seen=new Set();S.mastered=new Set();S.streak=0;S.maxStreak=0;S.hist=[];render();}">🔄 Reset</button></div>`;
}
function render(){
  const b=S.mode==='learn'?rLearn():S.mode==='quiz'?rQuiz():rStats();
  document.getElementById('app').innerHTML=rHdr()+rTabs()+`<div class="body">${b}</div>`;
  if(S.mode==='quiz'&&S.qpool.length&&S.qi<S.qpool.length&&!S.qstate)setTimeout(startTmr,50);
}
// Handlers
function SM(m){stopTmr();if(m==='quiz'&&S.mode!=='quiz'){S.qpool=[];}S.mode=m;render();}
function SC(c){S.cat=c;S.idx=0;S.flip=false;S.showBook=false;S.search='';markSeen();render();}
function flipCard(){S.flip=!S.flip;render();}
function nav(d){S.flip=false;const f=gf();let n=S.idx+d;if(n<0)n=f.length-1;if(n>=f.length)n=0;S.idx=n;markSeen();render();}
function rndCard(){const f=gf();S.idx=Math.floor(Math.random()*f.length);S.flip=false;markSeen();render();}
function markMast(){const f=gf(),c=f[S.idx];if(c){S.mastered.add(c.kn);}nav(1);}
function markSeen(){const f=gf(),c=f[S.idx];if(c){S.seen.add(c.kn);S.lc++;if(S.lc>0&&S.lc%8===0)S.banner=true;}}
function tgBk(kn){S.bookmarks.has(kn)?S.bookmarks.delete(kn):S.bookmarks.add(kn);render();}
function doSearch(v){S.search=v;S.idx=0;render();}
function openQS(){stopTmr();S.qpool=[];S.mode='quiz';render();}
function tgQC(c){if(c==='ALL'){S.qs.cats=new Set(['ALL']);}else{S.qs.cats.delete('ALL');S.qs.cats.has(c)?S.qs.cats.delete(c):S.qs.cats.add(c);if(!S.qs.cats.size)S.qs.cats.add('ALL');}render();}
function setQC(v){S.qs.count=v;render();}
function stepC(d){const cur=S.qs.count==='max'?prev().avail:Number(S.qs.count);S.qs.count=Math.max(1,cur+d);render();}
function launchQ(){
  stopTmr();const pool=bp();S.lastCards=pool.map(q=>q.card);S.qpool=pool;S.qi=0;S.qstate=null;S.qscore={r:0,w:0};S.streak=0;S.maxStreak=0;S.banner=false;S.mode='quiz';
  render();
}
function repeatQ(){
  stopTmr();const cards=shuf(S.lastCards);const qs=S.qs;
  S.qpool=cards.map(c=>{const rv=qs.dir==='kn-en'?true:qs.dir==='en-kn'?false:Math.random()>0.5;return mkQ(c,AC,rv);});
  S.qi=0;S.qstate=null;S.qscore={r:0,w:0};S.streak=0;S.maxStreak=0;render();
}
function ansQ(v){
  if(S.qstate)return;stopTmr();
  const q=S.qpool[S.qi],ok=v===q.cv;
  S.qstate={chosen:v,correct:q.cv,ok};
  S.qscore.r+=ok?1:0;S.qscore.w+=ok?0:1;
  S.streak=ok?S.streak+1:0;if(S.streak>S.maxStreak)S.maxStreak=S.streak;
  render();
}
function nextQ(){
  S.qi++;S.qstate=null;
  if(S.qi>=S.qpool.length){
    const sc=S.qscore,qs=S.qs;
    const cats=qs.cats.has('ALL')?'All':Array.from(qs.cats).map(c=>c.split(' ')[0]).join(',');
    S.hist.push({r:sc.r,t:S.qpool.length,dir:qs.dir,cats});
  }
  render();
}
// Keyboard
document.addEventListener('keydown',e=>{
  if(S.mode==='learn'){
    if(e.key==='ArrowLeft')nav(-1);
    else if(e.key==='ArrowRight')nav(1);
    else if(e.key===' '){e.preventDefault();flipCard();}
    else if(e.key.toLowerCase()==='m')markMast();
  }else if(S.mode==='quiz'&&S.qpool.length&&S.qi<S.qpool.length){
    if(!S.qstate){
      const q=S.qpool[S.qi],keys=['1','2','3','4'];const ki=keys.indexOf(e.key);
      if(ki>=0&&ki<q.opts.length)ansQ(q.opts[ki].v);
    }else if(e.key===' '||e.key==='Enter'){e.preventDefault();nextQ();}
  }
});
// Init
const f0=AC[0];if(f0){S.seen.add(f0.kn);}
render();
</script>
</body></html>
